spring.application.name=backend

spring.config.import=optional:file:.env[.properties]

# Supabase PostgreSQL connection via Session Pooler
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER:${DATABASE_USERNAME:}}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP pool settings optimized for Supabase Session Pooler
# Session pooler has connection limits, so use smaller pool sizes
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:2525}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:false}
app.mail.from=${MAIL_FROM:no-reply@dasigconnect.local}
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:5173}

app.supabase.url=${SUPABASE_URL:}
app.supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}
app.supabase.storage-bucket=${SUPABASE_STORAGE_BUCKET:dasigconnect-media}

# Add this at the end for production logging
logging.level.root=INFO
logging.level.com.dasigconnect=INFO
logging.level.org.flywaydb=INFO
